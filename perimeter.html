<script>

    function calPerimeter(params) {
        let length = Number(document.getElementById('length').value) // 0
        let breadth = Number(document.getElementById('breadth').value) // 0
        let displayPeri = document.getElementById('displayPerimeter')

        // 2(l + B)

        displayPeri.innerHTML = ` The perimeter of a rectangle with length ${length} and breadth ${breadth} is ${perimeter} `
